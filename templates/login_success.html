<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success - AcornHUB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #F5F0FF 0%, #E6E0FF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .success-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(127, 95, 207, 0.2);
            text-align: center;
            max-width: 500px;
        }

        .check-icon {
            font-size: 60px;
            color: #7F5FCF;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="check-icon">✓</div>
        <h2 style="color: #5D3FA3; font-weight: 800;">Login Successful!</h2>
        <p class="text-muted mt-3">
            Your device <strong>{{ hostname }}</strong> has been registered.
        </p>
        <p class="mt-4">
            You can close this window now. Your AcornHUB desktop app will refresh automatically.
        </p>
    </div>
</body>

</html>
